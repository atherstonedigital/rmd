[build]
  command = "npm run build"
  publish = "dist"

# Trailing slash redirects (no force — only redirect when no asset matches)
[[redirects]]
  from = "/gallery"
  to = "/gallery/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/testimonials"
  to = "/testimonials/"
  status = 301

[[redirects]]
  from = "/karndean-flooring"
  to = "/karndean-flooring/"
  status = 301

[[redirects]]
  from = "/amtico-flooring"
  to = "/amtico-flooring/"
  status = 301

[[redirects]]
  from = "/lvt-flooring"
  to = "/lvt-flooring/"
  status = 301

[[redirects]]
  from = "/carpets-and-stair-runners"
  to = "/carpets-and-stair-runners/"
  status = 301

[[redirects]]
  from = "/thank-you"
  to = "/thank-you/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com"

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No-cache for HTML pages
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"
